
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Matrix Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&family=DotGothic16&family=VT323&family=Silkscreen&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
    /* Smooth transition for font changes */
    .font-preview {
      transition: font-family 0.2s ease;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse-red {
      animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
<script type="importmap">

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "gifshot": "https://esm.sh/gifshot@^0.4.5"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
